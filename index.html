<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MusicDance - 音频转换</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-primary: #0d0d0d;
      --bg-secondary: #1a1a2e;
      --bg-card: rgba(30, 30, 50, 0.8);
      --accent: #6366f1;
      --accent-light: #818cf8;
      --accent-gradient: linear-gradient(135deg, #6366f1, #a855f7, #ec4899);
      --text-primary: #f1f5f9;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;
      --success: #22c55e;
      --warning: #f59e0b;
      --error: #ef4444;
      --border: rgba(255, 255, 255, 0.1);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "SF Pro Display", sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* 动态背景 */
    .bg-animation {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      overflow: hidden;
    }

    .bg-orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.4;
      animation: float 20s ease-in-out infinite;
    }

    .bg-orb:nth-child(1) {
      width: 600px;
      height: 600px;
      background: #6366f1;
      top: -200px;
      left: -100px;
      animation-delay: 0s;
    }

    .bg-orb:nth-child(2) {
      width: 500px;
      height: 500px;
      background: #a855f7;
      bottom: -150px;
      right: -100px;
      animation-delay: -7s;
    }

    .bg-orb:nth-child(3) {
      width: 400px;
      height: 400px;
      background: #ec4899;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      animation-delay: -14s;
    }

    @keyframes float {
      0%, 100% { transform: translate(0, 0) scale(1); }
      25% { transform: translate(30px, -30px) scale(1.05); }
      50% { transform: translate(-20px, 20px) scale(0.95); }
      75% { transform: translate(20px, 30px) scale(1.02); }
    }

    /* 主容器 */
    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 40px 20px;
      position: relative;
    }

    /* 头部 */
    .header {
      text-align: center;
      margin-bottom: 40px;
    }

    .logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 16px;
    }

    .logo-icon {
      width: 56px;
      height: 56px;
      background: var(--accent-gradient);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 32px rgba(99, 102, 241, 0.4);
    }

    .logo-icon svg {
      width: 32px;
      height: 32px;
      fill: white;
    }

    .logo-text {
      font-size: 32px;
      font-weight: 700;
      background: var(--accent-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      color: var(--text-secondary);
      font-size: 16px;
      margin-top: 8px;
    }

    /* 功能标签 */
    .feature-tags {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
      margin-bottom: 32px;
    }

    .feature-tag {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      background: rgba(99, 102, 241, 0.1);
      border: 1px solid rgba(99, 102, 241, 0.2);
      border-radius: 20px;
      font-size: 13px;
      color: var(--accent-light);
    }

    .feature-tag svg {
      width: 14px;
      height: 14px;
      stroke: var(--accent-light);
      fill: none;
      stroke-width: 2;
    }

    /* 上传区域 */
    .upload-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 24px;
    }

    .upload-area {
      background: var(--bg-card);
      border: 2px dashed var(--border);
      border-radius: 20px;
      padding: 32px 24px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s ease;
      backdrop-filter: blur(20px);
      position: relative;
      overflow: hidden;
    }

    .upload-area::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: var(--accent-gradient);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .upload-area:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
    }

    .upload-area:hover::before {
      opacity: 0.05;
    }

    .upload-area.dragover {
      border-color: var(--accent-light);
      background: rgba(99, 102, 241, 0.1);
    }

    .upload-icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 16px;
      background: rgba(99, 102, 241, 0.15);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .upload-icon svg {
      width: 32px;
      height: 32px;
      stroke: var(--accent-light);
      fill: none;
      stroke-width: 1.5;
    }

    .upload-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 6px;
    }

    .upload-desc {
      font-size: 13px;
      color: var(--text-muted);
    }

    input[type="file"] { display: none; }

    /* 统计信息 */
    .stats-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      background: var(--bg-card);
      border-radius: 12px;
      margin-bottom: 16px;
      backdrop-filter: blur(20px);
    }

    .stats-info {
      display: flex;
      gap: 24px;
    }

    .stat-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .stat-value {
      font-size: 20px;
      font-weight: 700;
      color: var(--text-primary);
    }

    .stat-label {
      font-size: 13px;
      color: var(--text-muted);
    }

    /* 总进度条 */
    .total-progress {
      height: 4px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 2px;
      margin-bottom: 16px;
      overflow: hidden;
    }

    .total-progress-fill {
      height: 100%;
      width: 0%;
      background: var(--accent-gradient);
      border-radius: 2px;
      transition: width 0.3s ease;
      position: relative;
    }

    .total-progress-fill::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
      animation: shimmer 1.5s infinite;
    }

    @keyframes shimmer {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(100%); }
    }

    /* 文件列表 */
    .file-list-container {
      background: var(--bg-card);
      border-radius: 20px;
      backdrop-filter: blur(20px);
      overflow: hidden;
      margin-bottom: 20px;
    }

    .file-list {
      max-height: 400px;
      overflow-y: auto;
    }

    .file-list::-webkit-scrollbar {
      width: 6px;
    }

    .file-list::-webkit-scrollbar-track {
      background: transparent;
    }

    .file-list::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }

    .empty-state {
      padding: 60px 20px;
      text-align: center;
    }

    .empty-icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 20px;
      background: rgba(99, 102, 241, 0.1);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .empty-icon svg {
      width: 40px;
      height: 40px;
      stroke: var(--text-muted);
      fill: none;
      stroke-width: 1.5;
    }

    .empty-text {
      color: var(--text-muted);
      font-size: 15px;
    }

    /* 文件夹分组 */
    .folder-group {
      border-bottom: 1px solid var(--border);
    }

    .folder-group:last-child {
      border-bottom: none;
    }

    .folder-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 20px;
      background: rgba(0, 0, 0, 0.2);
      position: sticky;
      top: 0;
      z-index: 1;
    }

    .folder-icon {
      width: 20px;
      height: 20px;
      opacity: 0.6;
    }

    .folder-path {
      flex: 1;
      font-size: 13px;
      color: var(--text-secondary);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .folder-count {
      font-size: 12px;
      color: var(--text-muted);
      background: rgba(255, 255, 255, 0.05);
      padding: 4px 10px;
      border-radius: 20px;
    }

    /* 文件项 */
    .file-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 20px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.03);
      transition: background 0.2s;
    }

    .file-item:last-child {
      border-bottom: none;
    }

    .file-item:hover {
      background: rgba(255, 255, 255, 0.02);
    }

    .file-icon {
      width: 40px;
      height: 40px;
      background: rgba(99, 102, 241, 0.15);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .file-icon svg {
      width: 20px;
      height: 20px;
      stroke: var(--accent-light);
      fill: none;
      stroke-width: 1.5;
    }

    .file-info {
      flex: 1;
      min-width: 0;
    }

    .file-name {
      font-size: 14px;
      color: var(--text-primary);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      margin-bottom: 2px;
    }

    .file-size {
      font-size: 12px;
      color: var(--text-muted);
    }

    .file-status {
      font-size: 12px;
      padding: 4px 12px;
      border-radius: 20px;
      font-weight: 500;
      flex-shrink: 0;
    }

    .file-status.pending {
      background: rgba(255, 255, 255, 0.05);
      color: var(--text-muted);
    }

    .file-status.processing {
      background: rgba(245, 158, 11, 0.15);
      color: var(--warning);
    }

    .file-status.done {
      background: rgba(34, 197, 94, 0.15);
      color: var(--success);
    }

    .file-status.error {
      background: rgba(239, 68, 68, 0.15);
      color: var(--error);
    }

    /* 进度条 */
    .file-progress {
      width: 60px;
      height: 4px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 2px;
      overflow: hidden;
      flex-shrink: 0;
    }

    .file-progress-fill {
      height: 100%;
      width: 0%;
      background: var(--accent-gradient);
      border-radius: 2px;
      transition: width 0.2s;
    }

    /* 按钮行 */
    .btn-row {
      display: flex;
      gap: 12px;
    }

    .btn {
      flex: 1;
      padding: 16px 24px;
      border: none;
      border-radius: 14px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn svg {
      width: 20px;
      height: 20px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
    }

    .btn-primary {
      background: var(--accent-gradient);
      color: white;
      box-shadow: 0 4px 20px rgba(99, 102, 241, 0.4);
    }

    .btn-primary:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 6px 30px rgba(99, 102, 241, 0.5);
    }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.05);
      color: var(--text-secondary);
      border: 1px solid var(--border);
    }

    .btn-secondary:hover:not(:disabled) {
      background: rgba(255, 255, 255, 0.08);
      color: var(--text-primary);
    }

    .btn-secondary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* 格式提示 */
    .format-hint {
      text-align: center;
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 20px;
      padding: 12px;
      background: rgba(255, 255, 255, 0.02);
      border-radius: 10px;
    }

    .format-hint span {
      color: var(--accent-light);
    }

    /* 响应式 */
    @media (max-width: 600px) {
      .container {
        padding: 20px 16px;
      }

      .upload-grid {
        grid-template-columns: 1fr;
      }

      .stats-bar {
        flex-direction: column;
        gap: 12px;
      }

      .stats-info {
        width: 100%;
        justify-content: space-around;
      }

      .btn-row {
        flex-direction: column;
      }

      .btn {
        padding: 14px;
      }
    }

    /* 音波动画 */
    .wave-container {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 3px;
      height: 24px;
    }

    .wave-bar {
      width: 3px;
      background: var(--accent-light);
      border-radius: 2px;
      animation: wave 1s ease-in-out infinite;
    }

    .wave-bar:nth-child(1) { animation-delay: 0s; }
    .wave-bar:nth-child(2) { animation-delay: 0.1s; }
    .wave-bar:nth-child(3) { animation-delay: 0.2s; }
    .wave-bar:nth-child(4) { animation-delay: 0.3s; }
    .wave-bar:nth-child(5) { animation-delay: 0.4s; }

    @keyframes wave {
      0%, 100% { height: 8px; }
      50% { height: 20px; }
    }
  </style>
</head>
<body>
  <!-- 动态背景 -->
  <div class="bg-animation">
    <div class="bg-orb"></div>
    <div class="bg-orb"></div>
    <div class="bg-orb"></div>
  </div>

  <div class="container">
    <!-- 头部 -->
    <div class="header">
      <div class="logo">
        <div class="logo-icon">
          <svg viewBox="0 0 24 24">
            <path d="M9 18V5l12-2v13"/>
            <circle cx="6" cy="18" r="3"/>
            <circle cx="18" cy="16" r="3"/>
          </svg>
        </div>
        <span class="logo-text">MusicDance</span>
      </div>
      <p class="subtitle">将任意音视频文件提取为 MP3 · 支持批量处理</p>
    </div>

    <!-- 功能说明 -->
    <div class="feature-tags">
      <div class="feature-tag">
        <svg viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
        <span>视频提取音频</span>
      </div>
      <div class="feature-tag">
        <svg viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
        <span>无损格式转换</span>
      </div>
      <div class="feature-tag">
        <svg viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
        <span>保留目录结构</span>
      </div>
      <div class="feature-tag">
        <svg viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
        <span>单个/批量均可</span>
      </div>
    </div>

    <!-- 上传区域 -->
    <div class="upload-grid">
      <div class="upload-area" id="folderUploadArea">
        <div class="upload-icon">
          <svg viewBox="0 0 24 24">
            <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
          </svg>
        </div>
        <div class="upload-title">选择文件夹</div>
        <div class="upload-desc">保留完整目录结构</div>
      </div>
      <div class="upload-area" id="fileUploadArea">
        <div class="upload-icon">
          <svg viewBox="0 0 24 24">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="12" y1="18" x2="12" y2="12"/>
            <line x1="9" y1="15" x2="15" y2="15"/>
          </svg>
        </div>
        <div class="upload-title">选择文件</div>
        <div class="upload-desc">支持多选或拖拽</div>
      </div>
    </div>
    <input type="file" id="folderInput" webkitdirectory directory multiple>
    <input type="file" id="fileInput" accept="video/mp4,audio/*,.mp4,.m4a,.m4b,.wav,.flac,.aac,.ogg,.wma,.avi,.mov,.mkv,.webm,.3gp" multiple>

    <!-- 统计信息 -->
    <div class="stats-bar" id="statsBar" style="display: none;">
      <div class="stats-info">
        <div class="stat-item">
          <span class="stat-value" id="fileCount">0</span>
          <span class="stat-label">个文件</span>
        </div>
        <div class="stat-item">
          <span class="stat-value" id="totalSize">0 MB</span>
          <span class="stat-label">总大小</span>
        </div>
      </div>
      <div class="wave-container" id="waveContainer" style="display: none;">
        <div class="wave-bar"></div>
        <div class="wave-bar"></div>
        <div class="wave-bar"></div>
        <div class="wave-bar"></div>
        <div class="wave-bar"></div>
      </div>
    </div>

    <!-- 总进度条 -->
    <div class="total-progress" id="totalProgressWrap" style="display:none">
      <div class="total-progress-fill" id="totalProgressFill"></div>
    </div>

    <!-- 文件列表 -->
    <div class="file-list-container">
      <div class="file-list" id="fileList">
        <div class="empty-state">
          <div class="empty-icon">
            <svg viewBox="0 0 24 24">
              <path d="M9 18V5l12-2v13"/>
              <circle cx="6" cy="18" r="3"/>
              <circle cx="18" cy="16" r="3"/>
            </svg>
          </div>
          <p class="empty-text">选择文件或文件夹，将音视频提取为 MP3</p>
        </div>
      </div>
    </div>

    <!-- 按钮 -->
    <div class="btn-row">
      <button class="btn btn-primary" id="convertBtn" disabled>
        <svg viewBox="0 0 24 24">
          <polygon points="5 3 19 12 5 21 5 3"/>
        </svg>
        开始转换
      </button>
      <button class="btn btn-secondary" id="downloadAllBtn" style="display:none">
        <svg viewBox="0 0 24 24">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        打包下载
      </button>
      <button class="btn btn-secondary" id="clearBtn" style="display:none">
        <svg viewBox="0 0 24 24">
          <polyline points="3 6 5 6 21 6"/>
          <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
        </svg>
        清空
      </button>
    </div>

    <div class="format-hint">
      支持格式：<span>MP4, M4A, WAV, FLAC, AAC, OGG, WMA, AVI, MOV, MKV, WebM, 3GP</span> 等音视频文件，自动提取音频转为 MP3
    </div>
  </div>

  <script>
    const folderUploadArea = document.getElementById('folderUploadArea');
    const fileUploadArea = document.getElementById('fileUploadArea');
    const folderInput = document.getElementById('folderInput');
    const fileInput = document.getElementById('fileInput');
    const fileList = document.getElementById('fileList');
    const statsBar = document.getElementById('statsBar');
    const fileCountEl = document.getElementById('fileCount');
    const totalSizeEl = document.getElementById('totalSize');
    const convertBtn = document.getElementById('convertBtn');
    const downloadAllBtn = document.getElementById('downloadAllBtn');
    const clearBtn = document.getElementById('clearBtn');
    const totalProgressWrap = document.getElementById('totalProgressWrap');
    const totalProgressFill = document.getElementById('totalProgressFill');
    const waveContainer = document.getElementById('waveContainer');

    const SUPPORTED_FORMATS = new Set([
      '.mp4', '.m4a', '.m4b', '.m4p', '.wav', '.flac', '.aac',
      '.ogg', '.wma', '.avi', '.mov', '.mkv', '.webm', '.3gp', '.mp3'
    ]);

    let files = [];
    let results = [];
    let isConverting = false;

    // 文件夹选择
    folderUploadArea.addEventListener('click', () => folderInput.click());
    folderUploadArea.addEventListener('dragover', (e) => {
      e.preventDefault();
      folderUploadArea.classList.add('dragover');
    });
    folderUploadArea.addEventListener('dragleave', () => folderUploadArea.classList.remove('dragover'));
    folderUploadArea.addEventListener('drop', (e) => {
      e.preventDefault();
      folderUploadArea.classList.remove('dragover');
      handleDrop(e.dataTransfer);
    });

    // 文件选择
    fileUploadArea.addEventListener('click', () => fileInput.click());
    fileUploadArea.addEventListener('dragover', (e) => {
      e.preventDefault();
      fileUploadArea.classList.add('dragover');
    });
    fileUploadArea.addEventListener('dragleave', () => fileUploadArea.classList.remove('dragover'));
    fileUploadArea.addEventListener('drop', (e) => {
      e.preventDefault();
      fileUploadArea.classList.remove('dragover');
      handleDrop(e.dataTransfer);
    });

    folderInput.addEventListener('change', (e) => {
      if (e.target.files.length) handleFiles(e.target.files, true);
    });

    fileInput.addEventListener('change', (e) => {
      if (e.target.files.length) handleFiles(e.target.files, false);
    });

    function handleDrop(dataTransfer) {
      const items = dataTransfer.items;
      const fileList = [];

      if (items) {
        for (let i = 0; i < items.length; i++) {
          const item = items[i].webkitGetAsEntry();
          if (item) {
            traverseFileTree(item, '').then(() => {
              if (fileList.length > 0) {
                processFileList(fileList);
              }
            });
          }
        }
      } else {
        handleFiles(dataTransfer.files, false);
      }

      function traverseFileTree(item, path) {
        return new Promise((resolve) => {
          if (item.isFile) {
            item.file((file) => {
              file.relativePath = path + file.name;
              fileList.push(file);
              resolve();
            });
          } else if (item.isDirectory) {
            const dirReader = item.createReader();
            dirReader.readEntries((entries) => {
              const promises = entries.map(entry =>
                traverseFileTree(entry, path + item.name + '/')
              );
              Promise.all(promises).then(resolve);
            });
          } else {
            resolve();
          }
        });
      }

      function processFileList(fileList) {
        const validFiles = fileList.filter(f => {
          const ext = '.' + f.name.split('.').pop().toLowerCase();
          return SUPPORTED_FORMATS.has(ext);
        });
        if (validFiles.length > 0) {
          files = files.concat(validFiles.map(f => ({
            file: f,
            relativePath: f.relativePath || f.name
          })));
          results = new Array(files.length).fill(null);
          renderList();
          updateStats();
        }
      }
    }

    function handleFiles(newFiles, isFolder) {
      const validFiles = Array.from(newFiles).filter(f => {
        const ext = '.' + f.name.split('.').pop().toLowerCase();
        return SUPPORTED_FORMATS.has(ext);
      });

      if (files.length + validFiles.length > 500) {
        alert('最多支持500个文件');
        return;
      }

      files = files.concat(validFiles.map(f => ({
        file: f,
        relativePath: f.webkitRelativePath || f.name
      })));
      results = new Array(files.length).fill(null);
      renderList();
      updateStats();
    }

    function formatSize(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / 1024 / 1024).toFixed(1) + ' MB';
    }

    function getFolderPath(relativePath) {
      const parts = relativePath.split('/');
      if (parts.length <= 1) return '';
      return parts.slice(0, -1).join('/');
    }

    function renderList() {
      if (files.length === 0) {
        fileList.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">
              <svg viewBox="0 0 24 24">
                <path d="M9 18V5l12-2v13"/>
                <circle cx="6" cy="18" r="3"/>
                <circle cx="18" cy="16" r="3"/>
              </svg>
            </div>
            <p class="empty-text">选择文件或文件夹，将音视频提取为 MP3</p>
          </div>
        `;
        return;
      }

      const groups = {};
      files.forEach((f, i) => {
        const folder = getFolderPath(f.relativePath);
        if (!groups[folder]) groups[folder] = [];
        groups[folder].push({ ...f, index: i });
      });

      let html = '';
      const sortedFolders = Object.keys(groups).sort();

      sortedFolders.forEach(folder => {
        const folderFiles = groups[folder];
        html += `
          <div class="folder-group">
            <div class="folder-header">
              <svg class="folder-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
              </svg>
              <span class="folder-path">${folder || '根目录'}</span>
              <span class="folder-count">${folderFiles.length} 个文件</span>
            </div>
            ${folderFiles.map(f => `
              <div class="file-item" data-index="${f.index}">
                <div class="file-icon">
                  <svg viewBox="0 0 24 24">
                    <path d="M9 18V5l12-2v13"/>
                    <circle cx="6" cy="18" r="3"/>
                    <circle cx="18" cy="16" r="3"/>
                  </svg>
                </div>
                <div class="file-info">
                  <div class="file-name">${f.file.name}</div>
                  <div class="file-size">${formatSize(f.file.size)}</div>
                </div>
                <span class="file-status pending" id="status-${f.index}">等待中</span>
                <div class="file-progress" id="progress-wrap-${f.index}" style="display:none">
                  <div class="file-progress-fill" id="progress-${f.index}"></div>
                </div>
              </div>
            `).join('')}
          </div>
        `;
      });

      fileList.innerHTML = html;
    }

    function updateStats() {
      const total = files.length;
      const totalSize = files.reduce((sum, f) => sum + f.file.size, 0);

      if (total > 0) {
        statsBar.style.display = 'flex';
        fileCountEl.textContent = total;
        totalSizeEl.textContent = formatSize(totalSize);
        convertBtn.disabled = false;
        clearBtn.style.display = 'flex';
      } else {
        statsBar.style.display = 'none';
        convertBtn.disabled = true;
        clearBtn.style.display = 'none';
      }
    }

    clearBtn.addEventListener('click', () => {
      files = [];
      results = [];
      renderList();
      updateStats();
      downloadAllBtn.style.display = 'none';
      totalProgressWrap.style.display = 'none';
      waveContainer.style.display = 'none';
    });

    convertBtn.addEventListener('click', async () => {
      if (!files.length || isConverting) return;

      isConverting = true;
      convertBtn.disabled = true;
      totalProgressWrap.style.display = 'block';
      waveContainer.style.display = 'flex';
      downloadAllBtn.style.display = 'none';

      let done = 0;
      const total = files.length;
      const concurrency = 3;
      let index = 0;

      async function processNext() {
        while (index < files.length) {
          const i = index++;
          await convertFile(i);
          done++;
          totalProgressFill.style.width = (done / total * 100) + '%';
        }
      }

      const workers = [];
      for (let j = 0; j < Math.min(concurrency, files.length); j++) {
        workers.push(processNext());
      }
      await Promise.all(workers);

      isConverting = false;
      convertBtn.disabled = false;
      waveContainer.style.display = 'none';
      downloadAllBtn.style.display = 'flex';
    });

    function convertFile(index) {
      return new Promise((resolve) => {
        const { file, relativePath } = files[index];
        const statusEl = document.getElementById(`status-${index}`);
        const progressWrap = document.getElementById(`progress-wrap-${index}`);
        const progressEl = document.getElementById(`progress-${index}`);

        statusEl.className = 'file-status processing';
        statusEl.textContent = '转换中';
        progressWrap.style.display = 'block';

        const formData = new FormData();
        formData.append('file', file);

        const xhr = new XMLHttpRequest();
        xhr.open('POST', '/api/convert');
        xhr.responseType = 'blob';

        xhr.upload.onprogress = (e) => {
          if (e.lengthComputable) {
            progressEl.style.width = (e.loaded / e.total * 50) + '%';
          }
        };

        xhr.onload = () => {
          if (xhr.status === 200) {
            const blob = xhr.response;
            const url = URL.createObjectURL(blob);
            const originalName = decodeURIComponent(xhr.getResponseHeader('X-Original-Name') || file.name);
            const mp3Name = originalName.replace(/\.[^.]+$/, '.mp3');

            results[index] = { url, relativePath, name: mp3Name, blob };

            statusEl.className = 'file-status done';
            statusEl.textContent = '完成';
            progressEl.style.width = '100%';
          } else {
            statusEl.className = 'file-status error';
            statusEl.textContent = '失败';
          }
          resolve();
        };

        xhr.onerror = () => {
          statusEl.className = 'file-status error';
          statusEl.textContent = '错误';
          resolve();
        };

        xhr.upload.onload = () => {
          progressEl.style.width = '50%';
        };

        xhr.send(formData);
      });
    }

    downloadAllBtn.addEventListener('click', async () => {
      const successResults = results.filter(r => r && r.blob);

      if (successResults.length === 0) {
        alert('没有可下载的文件');
        return;
      }

      downloadAllBtn.disabled = true;
      downloadAllBtn.innerHTML = `
        <svg viewBox="0 0 24 24" style="animation: spin 1s linear infinite;">
          <circle cx="12" cy="12" r="10" stroke-dasharray="32" stroke-dashoffset="32"/>
        </svg>
        打包中...
      `;

      try {
        const zip = new JSZip();

        successResults.forEach(r => {
          const mp3Path = r.relativePath.replace(/\.[^.]+$/, '.mp3');
          zip.file(mp3Path, r.blob);
        });

        const content = await zip.generateAsync({
          type: 'blob',
          compression: 'DEFLATE',
          compressionOptions: { level: 5 }
        });

        const url = URL.createObjectURL(content);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'MusicDance_converted.zip';
        a.click();
        URL.revokeObjectURL(url);

        downloadAllBtn.innerHTML = `
          <svg viewBox="0 0 24 24">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="7 10 12 15 17 10"/>
            <line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
          打包下载
        `;
        downloadAllBtn.disabled = false;
      } catch (err) {
        console.error('打包失败:', err);
        alert('打包失败: ' + err.message);
        downloadAllBtn.innerHTML = `
          <svg viewBox="0 0 24 24">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="7 10 12 15 17 10"/>
            <line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
          打包下载
        `;
        downloadAllBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
